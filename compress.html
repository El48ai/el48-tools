<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EL48 — Kompres Foto</title>
  <meta name="description" content="Kompres foto langsung di browser. Gratis, privat, tanpa watermark.">
  <meta property="og:title" content="EL48 — Kompres Foto">
  <meta property="og:description" content="Kompres foto langsung di browser. Gratis, privat, tanpa watermark.">
  <meta property="og:image" content="https://el48ai.github.io/el48-tools/og-image.png">
  <meta property="og:url" content="https://el48ai.github.io/el48-tools/compress.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://el48ai.github.io/el48-tools/og-image.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b0d10">
  <style>
    :root{ --bg1:#0b0d10; --bg2:#101722; --text:#f1f6ff; --muted:#a4b3c6; --border:rgba(255,255,255,.12); --brand:#e60012; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh}
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 40px}
    a{color:#fff}
    header{display:flex;align-items:center;gap:10px}
    .logo{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),#b8000e);font-weight:800;font-size:14px;flex-shrink:0}
    .panel{margin-top:12px;border:1px solid var(--border);border-radius:16px;background:linear-gradient(180deg,#101827ee,#0e1520ee);padding:12px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:280px}
    .drop{display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:14px;height:170px;background:#0e1420;color:#cfe0f2;text-align:center;padding:10px;cursor:pointer;transition:border-color .2s}
    .drop:hover{border-color:var(--brand)}
    .drop input{display:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:12px}
    .card{border:1px solid var(--border);border-radius:12px;padding:12px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}
    .card h3{margin:0 0 8px 0;font-size:14px;color:#e9f1fb}
    select{background:#0f1a2a;color:#f1f6ff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
    .btn{appearance:none;border:none;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;transition:.2s;font-size:14px}
    .btn.primary{background:#fff;color:#0b0d10}
    .btn.primary:hover{background:#e8e8e8}
    .btn.ghost{background:transparent;border:1px solid var(--border);color:#f1f6ff}
    .btn.ghost:hover{border-color:rgba(255,255,255,.3)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .preview{margin-top:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#0b0d10}
    .preview header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;color:#cfe0f2}
    canvas{display:block;width:100%;height:auto;background:#0b0d10}
    footer{margin-top:16px;text-align:center;color:#9db0c7;font-size:12px}
    .back{margin-top:6px;display:inline-block;font-size:13px}
    .slider-row{display:flex;align-items:center;gap:8px;margin-top:6px}
    .slider-row input[type=range]{flex:1}
    .slider-val{min-width:36px;text-align:right;font-size:13px;font-weight:700;color:#f1f6ff}
    .warning{font-size:11px;color:#f59e0b;margin-top:6px;padding:4px 8px;background:rgba(245,158,11,.1);border-radius:6px}
    .size-box{display:none;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .size-box input{width:100px;border-radius:8px;padding:8px;border:1px solid var(--border);background:#0f1a2a;color:#fff;font-size:13px}
    .size-box select{width:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">EL48</div>
      <div>
        <h1 style="margin:0;font-size:22px">Kompres Foto</h1>
        <div style="color:#a4b3c6;font-size:13px;margin-top:2px">Perkecil ukuran, jaga kualitas. 100% di browser.</div>
        <a href="index.html" class="back">← Kembali ke Landing</a>
      </div>
    </header>

    <section class="panel">
      <div class="row">
        <div class="col">
          <label class="drop" id="dropC">
            <input id="fileC" type="file" accept="image/*">
            <div>
              <div style="font-size:28px;margin-bottom:6px">📷</div>
              <strong>Ketuk untuk pilih foto</strong><br>
              <span style="font-size:12px;color:#7a95b0">atau tarik ke sini · JPG / PNG / WebP</span>
            </div>
          </label>

          <div class="grid">
            <!-- Target -->
            <div class="card">
              <h3>Target</h3>
              <select id="targetMode">
                <option value="quality" selected>Kualitas (%)</option>
                <option value="size">Ukuran target (KB/MB)</option>
              </select>

              <!-- Mode kualitas -->
              <div id="qualityBox" style="margin-top:8px">
                <div class="slider-row">
                  <input id="quality" type="range" min="10" max="95" value="82">
                  <span class="slider-val" id="qualityVal">82%</span>
                </div>
              </div>

              <!-- Mode ukuran target -->
              <div class="size-box" id="sizeBox">
                <input id="sizeVal" type="number" min="50" value="500">
                <select id="sizeUnit" style="width:70px">
                  <option value="KB" selected>KB</option>
                  <option value="MB">MB</option>
                </select>
                <span style="font-size:11px;color:#7a95b0">Contoh: 500 KB</span>
              </div>
            </div>

            <!-- Resize -->
            <div class="card">
              <h3>Resize (Opsional)</h3>
              <select id="resizePreset">
                <option value="none" selected>Tanpa resize</option>
                <option value="512">512 × 512 (Icon PWA)</option>
                <option value="192">192 × 192 (Icon PWA)</option>
                <option value="1080">Lebar maks 1080</option>
                <option value="1440">Lebar maks 1440</option>
                <option value="2160">Lebar maks 2160</option>
              </select>
              <div class="warning" id="pngWarn" style="display:none">⚠️ PNG akan dikonversi ke JPG</div>
            </div>

            <!-- Aksi -->
            <div class="card">
              <h3>Aksi</h3>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button id="processC" class="btn primary" style="flex:1" disabled>Kompres</button>
                <button id="downloadCJpg" class="btn ghost" style="flex:1" disabled>Download JPG</button>
              </div>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="preview">
            <header><span>Pratinjau</span><span id="infoC" style="font-size:11px"></span></header>
            <canvas id="cvC"></canvas>
          </div>
        </div>
      </div>
    </section>

    <footer>© 2026 EL48 AI — Semua proses lokal di perangkat kamu.</footer>
  </div>

  <script>
  (function(){
    const $ = s => document.querySelector(s);
    const fileC = $('#fileC'), dropC = $('#dropC'), cvC = $('#cvC'), infoC = $('#infoC');
    const targetMode = $('#targetMode'), qualityEl = $('#quality'), qualityVal = $('#qualityVal');
    const qualityBox = $('#qualityBox'), sizeBox = $('#sizeBox');
    const sizeVal = $('#sizeVal'), sizeUnit = $('#sizeUnit');
    const resizePreset = $('#resizePreset'), pngWarn = $('#pngWarn');
    const processC = $('#processC'), downloadCJpg = $('#downloadCJpg');
    let imgC = null;
    let lastDataUrl = null; // FIX: simpan hasil kompresi yang benar

    // Update slider label
    qualityEl.addEventListener('input', () => {
      qualityVal.textContent = qualityEl.value + '%';
      if (imgC) drawC();
    });

    // Toggle mode
    targetMode.addEventListener('change', () => {
      if (targetMode.value === 'size') {
        sizeBox.style.display = 'flex';
        qualityBox.style.display = 'none';
      } else {
        sizeBox.style.display = 'none';
        qualityBox.style.display = 'block';
      }
    });

    // PNG warning
    function checkPng() {
      const isPng = imgC && (imgC._isPng);
      pngWarn.style.display = isPng ? 'block' : 'none';
    }

    function loadFileC(file) {
      const isPng = file.type === 'image/png';
      const url = URL.createObjectURL(file);
      const im = new Image();
      im.onload = () => {
        imgC = im;
        imgC._isPng = isPng;
        URL.revokeObjectURL(url);
        processC.disabled = false;
        checkPng();
        drawC();
      };
      im.src = url;
    }

    function drawC() {
      if (!imgC) return;
      const srcW = imgC.naturalWidth, srcH = imgC.naturalHeight;
      let targetW = srcW, targetH = srcH;
      const preset = resizePreset.value;
      if (preset !== 'none') {
        const maxW = parseInt(preset, 10);
        if (srcW > maxW) {
          targetW = maxW;
          targetH = Math.round(srcH * (maxW / srcW));
        }
      }

      const tmp = document.createElement('canvas');
      tmp.width = targetW; tmp.height = targetH;
      const tctx = tmp.getContext('2d');
      tctx.imageSmoothingEnabled = true;
      tctx.imageSmoothingQuality = 'high';
      tctx.drawImage(imgC, 0, 0, targetW, targetH);

      let q = parseInt(qualityEl.value, 10) / 100;
      let dataUrl = tmp.toDataURL('image/jpeg', q);

      if (targetMode.value === 'size') {
        const bytesTarget = (parseInt(sizeVal.value, 10) || 500) * (sizeUnit.value === 'MB' ? 1024 * 1024 : 1024);
        let lower = 0.1, upper = 0.95;
        for (let i = 0; i < 10; i++) {
          dataUrl = tmp.toDataURL('image/jpeg', q);
          const curBytes = Math.ceil((dataUrl.length - 'data:image/jpeg;base64,'.length) * 3 / 4);
          if (curBytes > bytesTarget) { upper = q; q = (lower + q) / 2; }
          else { lower = q; q = (q + upper) / 2; }
        }
        dataUrl = tmp.toDataURL('image/jpeg', q);
      }

      lastDataUrl = dataUrl; // FIX: simpan ke variabel luar

      const out = new Image();
      out.onload = () => {
        cvC.width = out.naturalWidth; cvC.height = out.naturalHeight;
        const cctx = cvC.getContext('2d');
        cctx.imageSmoothingEnabled = true;
        cctx.imageSmoothingQuality = 'high';
        cctx.drawImage(out, 0, 0);
        const sizeKB = Math.ceil((dataUrl.length - 'data:image/jpeg;base64,'.length) * 3 / 4 / 1024);
        const origKB = Math.round(srcW * srcH * 3 / 1024);
        infoC.textContent = `${srcW}×${srcH} → ${cvC.width}×${cvC.height} • ~${sizeKB} KB`;
        downloadCJpg.disabled = false;
      };
      out.src = dataUrl;
    }

    // Events
    dropC.addEventListener('click', () => fileC.click());
    dropC.addEventListener('dragover', e => e.preventDefault());
    dropC.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files?.[0]; if (f) loadFileC(f); });
    fileC.addEventListener('change', e => { const f = e.target.files?.[0]; if (f) loadFileC(f); });
    [sizeVal, sizeUnit, resizePreset].forEach(el => el.addEventListener('change', () => { if (imgC) drawC(); }));
    processC.addEventListener('click', drawC);

    // FIX: Download pakai lastDataUrl (hasil kompresi sebenarnya, bukan hardcode 0.95)
    downloadCJpg.addEventListener('click', () => {
      if (!lastDataUrl) { alert('Belum ada hasil. Tekan Kompres.'); return; }
      const a = document.createElement('a');
      a.href = lastDataUrl;
      a.download = 'EL48-compressed.jpg';
      a.click();
    });
  })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('SW terdaftar'))
        .catch(err => console.warn('SW gagal:', err));
    }
  </script>
</body>
</html>
